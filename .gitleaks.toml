title = "self-hosting (jarvis) custom rules"

# Mantieni i ~150 rules built-in di gitleaks v8 (AWS, GitHub, Slack, Stripe,
# Anthropic sk-ant-*, ecc.) ed estendi con custom rules sotto.
[extend]
useDefault = true

# ─────────────────────────────────────────────────────────────────────────────
# Global allowlist — file che by design contengono valori reali (audit trail)
# ─────────────────────────────────────────────────────────────────────────────
[allowlist]
description = "Audit-trail files: GSD planning + research + sanitization map"
paths = [
  # GSD planning tree (research, PLANs, CONTEXTs, SUMMARYs, STATE, REQUIREMENTS,
  # ROADMAP) è documentazione metodologica del progetto. By design contiene i
  # valori reali (gli stessi che vengono poi sanitizzati nel README pubblico):
  # è il record audit del *cosa* è stato sostituito e *perché*. Stesso ragionamento
  # di T-02-05 nel threat model di 02-repo-sanitize-PLAN.md.
  '''\.planning/.*''',
  # Config gitleaks stessa (contiene gli allowlist regex con i pattern reali)
  '''\.gitleaks\.toml''',
]

# ─── Cloudflare Tunnel UUID v4 (or any UUID v4 cred filename) ───
[[rules]]
id = "cf-tunnel-uuid"
description = "Cloudflare Tunnel UUID (or any UUID v4 used as credential filename)"
regex = '''\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b'''
tags = ["cloudflare", "tunnel", "uuid"]
[rules.allowlist]
description = "Documentation placeholders only"
regexes = [
  '''00000000-0000-0000-0000-000000000000''',
  '''xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx''',
  '''aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa''',
]

# ─── Public IPv4 (excludes RFC1918 / loopback / CGNAT / TEST-NET / link-local) ───
[[rules]]
id = "public-ipv4"
description = "Public IPv4 address — redact to documentation range 203.0.113.X (TEST-NET-3)"
regex = '''\b(?:\d{1,3}\.){3}\d{1,3}\b'''
[rules.allowlist]
description = "Private/reserved/documentation ranges are fine"
regexes = [
  '''\b10\.(?:\d{1,3}\.){2}\d{1,3}\b''',
  '''\b172\.(?:1[6-9]|2\d|3[01])\.(?:\d{1,3}\.){1}\d{1,3}\b''',
  '''\b192\.168\.\d{1,3}\.\d{1,3}\b''',
  '''\b127\.\d{1,3}\.\d{1,3}\.\d{1,3}\b''',
  '''\b100\.(?:6[4-9]|[7-9]\d|1[01]\d|12[0-7])\.\d{1,3}\.\d{1,3}\b''',
  '''\b169\.254\.\d{1,3}\.\d{1,3}\b''',
  '''\b(192\.0\.2|198\.51\.100|203\.0\.113)\.\d{1,3}\b''',
  '''\b1\.2\.3\.4\b''',
  '''\b0\.0\.0\.0\b''',
  '''\b255\.255\.255\.(?:0|255)\b''',
  # Resolver DNS pubblici universalmente noti (no leak — appaiono in docs ovunque)
  '''\b1\.1\.1\.1\b''',                    # Cloudflare
  '''\b1\.0\.0\.1\b''',                    # Cloudflare secondary
  '''\b8\.8\.8\.8\b''',                    # Google
  '''\b8\.8\.4\.4\b''',                    # Google secondary
  '''\b9\.9\.9\.9\b''',                    # Quad9
  '''\b149\.112\.112\.112\b''',            # Quad9 secondary
  '''\b100\.100\.100\.100\b''',            # Tailscale MagicDNS (sentinella note)
]

# ─── Personal/work email ───
[[rules]]
id = "personal-email"
description = "Personal/work email leaked in docs or commits"
regex = '''(?i)\b[a-z0-9._%+-]+@(?:gmail|outlook|hotmail|yahoo|proton(?:mail)?|icloud|me|fastmail)\.[a-z]{2,}\b'''
[rules.allowlist]
description = "Documentation placeholders only"
regexes = [
  '''you@example\.com''',
  '''user@example\.com''',
  '''noreply@.*''',
  '''test@example\.com''',
]

# ─── JWT (loose pattern, complements built-in) ───
[[rules]]
id = "jwt-loose"
description = "JWT (loose: 3 base64url segments)"
regex = '''\beyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'''
tags = ["jwt"]

# ─── Filesystem paths to real cert/credential files ───
[[rules]]
id = "cred-paths"
description = "Filesystem path to a real cert/credentials file"
regex = '''(?i)(?:/etc/cloudflared|/home/[^/\s]+/\.cloudflared|/etc/letsencrypt/live)/[^\s'"]+\.(?:json|pem|key|crt)'''
[rules.allowlist]
description = "Documented placeholders"
regexes = [
  '''/etc/cloudflared/00000000-0000-0000-0000-000000000000\.json''',
  '''cert\.pem\.example''',
  '''/etc/cloudflared/<UUID>\.json''',
  '''/etc/cloudflared/<TUNNEL_UUID>\.json''',
]

# ─── Cloudflare Origin CA Key ───
[[rules]]
id = "cf-origin-ca"
description = "Cloudflare Origin CA key (v1.0-…)"
regex = '''\bv1\.0-[a-f0-9]{24}-[a-f0-9]{146}\b'''
tags = ["cloudflare"]

# ─── Personal hostname/subdomain (project-specific) ───
[[rules]]
id = "private-fqdn"
description = "Real subdomain of toto-castaldi.com — must be example.com in public docs"
regex = '''\b[a-z0-9-]+\.toto-castaldi\.com\b'''
tags = ["fqdn"]
